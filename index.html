<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kanban Board</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--surf:#161b22;--card:#1c2333;--border:#30363d;
  --text:#e6edf3;--muted:#8b949e;--faint:#484f58;
  --blue:#58a6ff;--purple:#bc8cff;--green:#3fb950;--amber:#d29922;--red:#f85149;
  --r:8px;--shadow:0 8px 24px rgba(0,0,0,.5);
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);min-height:100vh}

/* HEADER */
.hdr{height:56px;background:var(--surf);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;padding:0 20px;
  position:sticky;top:0;z-index:99}
.hdr-l{display:flex;align-items:center;gap:10px}
.logo{width:32px;height:32px;border-radius:7px;background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:16px}
.hdr h1{font-size:.95rem;font-weight:700}
.hdr small{font-size:.7rem;color:var(--muted)}
.sync{display:flex;align-items:center;gap:6px;background:var(--card);border:1px solid var(--border);
  border-radius:20px;padding:4px 12px;font-size:.72rem;color:var(--muted)}
.dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
.dot.spin{background:transparent;border:2px solid var(--amber);border-top-color:transparent;
  animation:spin .7s linear infinite}
.dot.err{background:var(--red)}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
@keyframes toastIn{from{transform:translateX(110%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes toastOut{to{transform:translateX(110%);opacity:0}}

/* TOOLBAR */
.toolbar{background:var(--surf);border-bottom:1px solid var(--border);
  padding:8px 20px;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.btn{display:inline-flex;align-items:center;gap:5px;padding:6px 13px;border-radius:var(--r);
  border:1px solid transparent;cursor:pointer;font-size:.8rem;font-weight:600;transition:all .15s}
.btn-p{background:var(--blue);color:#0d1117;border-color:var(--blue)}
.btn-p:hover{filter:brightness(1.1)}
.btn-g{background:var(--card);color:var(--muted);border-color:var(--border)}
.btn-g:hover{color:var(--text);border-color:var(--blue)}
.btn-d{background:transparent;color:var(--red);border-color:rgba(248,81,73,.4)}
.btn-d:hover{background:rgba(248,81,73,.1)}
.search{display:flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);
  border-radius:var(--r);padding:6px 11px;flex:1;max-width:260px;transition:border-color .15s}
.search:focus-within{border-color:var(--blue)}
.search input{background:none;border:none;outline:none;color:var(--text);font-size:.8rem;width:100%}
.search input::placeholder{color:var(--faint)}
.stats{margin-left:auto;display:flex;gap:18px}
.stat{text-align:center}
.stat b{display:block;font-size:1.05rem;font-weight:700}
.stat span{font-size:.62rem;color:var(--muted);text-transform:uppercase;letter-spacing:.06em}

/* BOARD */
.wrap{padding:18px 20px;overflow-x:auto}
.board{display:grid;grid-template-columns:repeat(3,minmax(280px,1fr));gap:14px}
.col{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  display:flex;flex-direction:column;min-height:500px}
.col-h{padding:13px 15px 11px;border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between}
.col-t{display:flex;align-items:center;gap:8px;font-size:.86rem;font-weight:700}
.cdot{width:8px;height:8px;border-radius:50%}
[data-col="Backlog"] .cdot{background:var(--blue)}
[data-col="In-Progress"] .cdot{background:var(--amber)}
[data-col="Done"] .cdot{background:var(--green)}
.cbadge{background:var(--card);border:1px solid var(--border);border-radius:20px;
  padding:1px 8px;font-size:.68rem;font-weight:700;color:var(--muted)}
.cadd{background:none;border:none;color:var(--faint);font-size:.95rem;cursor:pointer;
  padding:3px 7px;border-radius:5px;transition:all .15s}
.cadd:hover{background:var(--card);color:var(--blue)}
.tlist{padding:9px;flex:1;min-height:100px;transition:background .15s}
.tlist.dz{background:rgba(88,166,255,.04);outline:2px dashed rgba(88,166,255,.2);
  outline-offset:-4px;border-radius:6px}
.empty{display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:5px;padding:36px 12px;color:var(--faint);font-size:.8rem;
  border:1px dashed var(--border);border-radius:6px;margin:4px;text-align:center}
.ei{font-size:1.6rem;opacity:.35}

/* CARD */
.card{background:var(--card);border:1px solid var(--border);border-radius:7px;
  padding:11px 13px;margin-bottom:8px;cursor:grab;position:relative;
  transition:transform .15s,box-shadow .15s,border-color .15s;overflow:hidden}
.card::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px}
.card[data-p="high"]::before{background:var(--red)}
.card[data-p="medium"]::before{background:var(--amber)}
.card[data-p="low"]::before{background:var(--green)}
.card:hover{border-color:rgba(88,166,255,.4);transform:translateY(-2px);box-shadow:var(--shadow)}
.card:active{cursor:grabbing}
.card.ghost{opacity:.3;background:var(--blue)}
.card.dragging{opacity:.95;transform:rotate(1.5deg) scale(1.02);box-shadow:0 12px 36px rgba(88,166,255,.3)}
.card.saving{opacity:.5;pointer-events:none}
.card.conflict{border-color:var(--red);animation:shake .4s ease}
.acts{display:none;position:absolute;top:8px;right:8px;gap:4px}
.card:hover .acts{display:flex}
.ab{background:var(--surf);border:1px solid var(--border);border-radius:4px;
  padding:3px 6px;font-size:.66rem;cursor:pointer;color:var(--muted);transition:all .15s}
.ab:hover{color:var(--text);border-color:var(--blue)}
.ab.del:hover{color:var(--red);border-color:var(--red)}
.cid{font-size:.6rem;font-family:monospace;color:var(--faint);margin-bottom:4px}
.ctitle{font-size:.86rem;font-weight:600;margin-bottom:5px;padding-right:52px;line-height:1.35}
.cdesc{font-size:.74rem;color:var(--muted);margin-bottom:9px;line-height:1.4;
  display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cfoot{display:flex;align-items:center;justify-content:space-between}
.chip{font-size:.6rem;font-weight:700;padding:2px 7px;border-radius:20px;text-transform:uppercase}
.ch{background:rgba(248,81,73,.15);color:var(--red);border:1px solid rgba(248,81,73,.3)}
.cm{background:rgba(210,153,34,.15);color:var(--amber);border:1px solid rgba(210,153,34,.3)}
.cl{background:rgba(63,185,80,.15);color:var(--green);border:1px solid rgba(63,185,80,.3)}
.ava{display:flex;align-items:center;gap:5px;font-size:.7rem;color:var(--muted)}
.av{width:19px;height:19px;border-radius:50%;background:linear-gradient(135deg,var(--blue),var(--purple));
  display:flex;align-items:center;justify-content:center;font-size:.58rem;font-weight:700;color:#fff}

/* MODAL */
.ov{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:200;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px);
  opacity:0;pointer-events:none;transition:opacity .2s}
.ov.on{opacity:1;pointer-events:all}
.modal{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:24px;width:92%;max-width:480px;transform:scale(.96) translateY(8px);
  transition:transform .2s;box-shadow:var(--shadow)}
.ov.on .modal,.ov.on .cbox{transform:scale(1) translateY(0)}
.mh{display:flex;align-items:center;justify-content:space-between;margin-bottom:18px}
.mh h2{font-size:.96rem;font-weight:700}
.mx{background:none;border:none;color:var(--muted);font-size:1rem;cursor:pointer;
  padding:4px 7px;border-radius:5px;transition:all .15s}
.mx:hover{background:var(--card);color:var(--text)}
.fg{margin-bottom:13px}
.fg label{display:block;font-size:.7rem;font-weight:600;color:var(--muted);
  margin-bottom:5px;text-transform:uppercase;letter-spacing:.06em}
.fg input,.fg select,.fg textarea{width:100%;background:var(--card);border:1px solid var(--border);
  border-radius:7px;color:var(--text);font-size:.86rem;padding:8px 12px;outline:none;
  transition:border-color .15s;font-family:inherit}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue)}
.fg textarea{resize:vertical;min-height:75px}
.fg select option{background:var(--card)}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:11px}
.mf{display:flex;gap:9px;justify-content:flex-end;margin-top:18px}

/* CONFIRM */
.cbox{background:var(--surf);border:1px solid var(--border);border-radius:var(--r);
  padding:22px;width:92%;max-width:340px;text-align:center;transform:scale(.96);
  transition:transform .2s;box-shadow:var(--shadow)}
.cf{display:flex;gap:9px;justify-content:center;margin-top:16px}

/* TOAST */
#toasts{position:fixed;bottom:18px;right:18px;z-index:999;display:flex;flex-direction:column;gap:7px;pointer-events:none}
.toast{background:var(--surf);border:1px solid var(--border);border-radius:7px;
  padding:9px 14px;display:flex;align-items:center;gap:9px;font-size:.8rem;max-width:320px;
  box-shadow:var(--shadow);animation:toastIn .25s ease;pointer-events:all}
.toast.s{border-left:3px solid var(--green)}
.toast.e{border-left:3px solid var(--red)}
.toast.w{border-left:3px solid var(--amber)}
.toast.i{border-left:3px solid var(--blue)}

/* LOADER */
#loader{position:fixed;inset:0;background:var(--bg);z-index:500;
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px}
.ring{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--blue);
  border-radius:50%;animation:spin .8s linear infinite}
#loader p{color:var(--muted);font-size:.86rem}

@media(max-width:760px){
  .board{grid-template-columns:1fr}
  .stats{display:none}
  .wrap,.toolbar{padding:10px 14px}
}
</style>
</head>
<body>

<div id="loader"><div class="ring"></div><p>Loading board…</p></div>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-l">
    <div class="logo">📋</div>
    <div><h1>Kanban Board</h1><small>Collaborative Task Management</small></div>
  </div>
  <div class="sync"><div class="dot" id="dot"></div><span id="stext">Live</span></div>
</header>

<!-- TOOLBAR -->
<div class="toolbar">
  <button class="btn btn-p" onclick="openAdd()">＋ New Task</button>
  <button class="btn btn-g" onclick="loadTasks(true)">↺ Refresh</button>
  <div class="search">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
    </svg>
    <input type="text" placeholder="Search tasks…" oninput="onSearch(this.value)"/>
  </div>
  <select class="btn btn-g" id="pf" onchange="render()" style="cursor:pointer">
    <option value="">All Priorities</option>
    <option value="high">🔴 High</option>
    <option value="medium">🟡 Medium</option>
    <option value="low">🟢 Low</option>
  </select>
  <div class="stats">
    <div class="stat"><b id="st">0</b><span>Total</span></div>
    <div class="stat"><b id="sb" style="color:var(--blue)">0</b><span>Backlog</span></div>
    <div class="stat"><b id="si" style="color:var(--amber)">0</b><span>In Progress</span></div>
    <div class="stat"><b id="sd" style="color:var(--green)">0</b><span>Done</span></div>
  </div>
</div>

<!-- BOARD -->
<div class="wrap"><div class="board">
  <div class="col" data-col="Backlog">
    <div class="col-h">
      <div class="col-t"><div class="cdot"></div>📥 Backlog</div>
      <div style="display:flex;align-items:center;gap:7px">
        <span class="cbadge" id="c-Backlog">0</span>
        <button class="cadd" onclick="openAdd('Backlog')">＋</button>
      </div>
    </div>
    <div class="tlist" id="col-Backlog" data-col="Backlog"></div>
  </div>
  <div class="col" data-col="In-Progress">
    <div class="col-h">
      <div class="col-t"><div class="cdot"></div>⚡ In Progress</div>
      <div style="display:flex;align-items:center;gap:7px">
        <span class="cbadge" id="c-In-Progress">0</span>
        <button class="cadd" onclick="openAdd('In-Progress')">＋</button>
      </div>
    </div>
    <div class="tlist" id="col-In-Progress" data-col="In-Progress"></div>
  </div>
  <div class="col" data-col="Done">
    <div class="col-h">
      <div class="col-t"><div class="cdot"></div>✅ Done</div>
      <div style="display:flex;align-items:center;gap:7px">
        <span class="cbadge" id="c-Done">0</span>
        <button class="cadd" onclick="openAdd('Done')">＋</button>
      </div>
    </div>
    <div class="tlist" id="col-Done" data-col="Done"></div>
  </div>
</div></div>

<!-- ADD/EDIT MODAL -->
<div class="ov" id="tModal">
  <div class="modal">
    <div class="mh"><h2 id="mTitle">Add Task</h2><button class="mx" onclick="closeM()">✕</button></div>
    <div class="fg"><label>Title *</label><input id="mT" placeholder="What needs to be done?"/></div>
    <div class="fg"><label>Description</label><textarea id="mD" placeholder="Details…"></textarea></div>
    <div class="row2">
      <div class="fg"><label>Priority</label>
        <select id="mP"><option value="high">🔴 High</option><option value="medium" selected>🟡 Medium</option><option value="low">🟢 Low</option></select>
      </div>
      <div class="fg"><label>Assignee</label><input id="mA" placeholder="Name…"/></div>
    </div>
    <input type="hidden" id="mId"/><input type="hidden" id="mMode" value="add"/><input type="hidden" id="mSt" value="Backlog"/>
    <div class="mf">
      <button class="btn btn-g" onclick="closeM()">Cancel</button>
      <button class="btn btn-p" id="mBtn" onclick="submit()">Add Task</button>
    </div>
  </div>
</div>

<!-- CONFIRM DELETE -->
<div class="ov" id="dModal">
  <div class="cbox">
    <div style="font-size:1.8rem;margin-bottom:8px">🗑️</div>
    <div style="font-weight:700;margin-bottom:6px">Delete Task</div>
    <div class="cdesc" id="dMsg" style="color:var(--muted);margin-bottom:0">Sure?</div>
    <div class="cf">
      <button class="btn btn-g" onclick="closeD()">Cancel</button>
      <button class="btn btn-d" id="dOk">Delete</button>
    </div>
  </div>
</div>

<div id="toasts"></div>

<script>
var tasks=[], lastTs="", pollTimer=null, polling=false, q="", POLL=4000;

window.onload=function(){ loadTasks(true); pollTimer=setInterval(poll,POLL); };

// ── LOAD ──────────────────────────────────────────────────────
function loadTasks(show){
  if(show) sync("spin","Loading…");
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){ tasks=r.tasks; render(); stats(); document.getElementById("loader").style.display="none"; sync("ok","Live"); }
      else{ toast("Error: "+r.error,"e"); sync("err","Error"); document.getElementById("loader").style.display="none"; }
    })
    .withFailureHandler(function(e){ toast("Failed: "+e.message,"e"); sync("err","Offline"); document.getElementById("loader").style.display="none"; })
    .getTasks();
}

// ── POLL (lightweight — only fetches timestamp) ────────────────
function poll(){
  if(polling) return;
  polling=true;
  google.script.run
    .withSuccessHandler(function(r){ polling=false; if(r.success && r.lastUpdated && r.lastUpdated!==lastTs){ lastTs=r.lastUpdated; loadTasks(false); } })
    .withFailureHandler(function(){ polling=false; sync("err","Offline"); })
    .getLastUpdated();
}

// ── RENDER ────────────────────────────────────────────────────
function render(){
  var pf=document.getElementById("pf").value;
  ["Backlog","In-Progress","Done"].forEach(function(col){
    var el=document.getElementById("col-"+col);
    var list=tasks.filter(function(t){
      return t.status===col && (!pf||t.priority===pf) &&
        (!q||(t.title+" "+t.description+" "+t.assignee).toLowerCase().indexOf(q)>-1);
    });
    el.innerHTML = list.length ? list.map(card).join("") :
      '<div class="empty"><div class="ei">📭</div>Drop tasks here</div>';
    document.getElementById("c-"+col).textContent=list.length;
  });
  initSort();
}

function card(t){
  var pc={"high":"ch","medium":"cm","low":"cl"}[t.priority||"medium"]||"cm";
  return '<div class="card" data-id="'+t.id+'" data-ts="'+t.lastUpdated+'" data-p="'+(t.priority||"medium")+'">'
    +'<div class="acts"><button class="ab" onclick="openEdit(\''+t.id+'\')">✏️</button>'
    +'<button class="ab del" onclick="askDel(\''+t.id+'\')">🗑️</button></div>'
    +'<div class="cid">'+x(t.id)+'</div>'
    +'<div class="ctitle">'+x(t.title)+'</div>'
    +(t.description?'<div class="cdesc">'+x(t.description)+'</div>':'')
    +'<div class="cfoot"><span class="chip '+pc+'">'+(t.priority||"medium")+'</span>'
    +(t.assignee?'<div class="ava"><div class="av">'+t.assignee[0].toUpperCase()+'</div>'+x(t.assignee)+'</div>':'')
    +'</div></div>';
}

// ── SORTABLE (drag-and-drop) ──────────────────────────────────
function initSort(){
  ["Backlog","In-Progress","Done"].forEach(function(col){
    var el=document.getElementById("col-"+col);
    if(el._s) el._s.destroy();
    el._s=new Sortable(el,{
      group:"kb", animation:180, ghostClass:"ghost", dragClass:"dragging",
      filter:".ab,.empty",
      onStart:function(){ document.querySelectorAll(".tlist").forEach(function(l){l.classList.add("dz")}); },
      onEnd:function(e){
        document.querySelectorAll(".tlist").forEach(function(l){l.classList.remove("dz")});
        var id=e.item.getAttribute("data-id"), ts=e.item.getAttribute("data-ts");
        var nc=e.to.getAttribute("data-col"), oc=e.from.getAttribute("data-col");
        if(nc===oc && e.oldIndex===e.newIndex) return;
        moveCard(id, nc, ts, e.item);
      }
    });
  });
}

// ── MOVE (concurrency + conflict handling) ────────────────────
function moveCard(id, status, clientTs, el){
  sync("spin","Saving…");
  if(el) el.classList.add("saving");
  google.script.run
    .withSuccessHandler(function(r){
      if(el) el.classList.remove("saving");
      if(r.success){
        var t=tasks.find(function(x){return x.id===id});
        if(t){ t.status=status; t.lastUpdated=r.timestamp; }
        lastTs=r.timestamp; render(); stats(); sync("ok","Live");
        toast("Moved to "+status,"s");
      } else if(r.conflict){
        if(el) el.classList.add("conflict");
        toast("⚠️ Conflict — reloading","w");
        setTimeout(function(){loadTasks(false)},800);
      } else { toast("Error: "+r.error,"e"); loadTasks(false); }
    })
    .withFailureHandler(function(e){ if(el)el.classList.remove("saving"); toast("Network error","e"); loadTasks(false); })
    .updateTaskStatus(id, status, clientTs);
}

// ── ADD / EDIT MODAL ─────────────────────────────────────────
function openAdd(s){
  document.getElementById("mTitle").textContent="Add Task";
  document.getElementById("mBtn").textContent="Add Task";
  document.getElementById("mMode").value="add";
  document.getElementById("mId").value="";
  document.getElementById("mSt").value=s||"Backlog";
  document.getElementById("mT").value="";
  document.getElementById("mD").value="";
  document.getElementById("mP").value="medium";
  document.getElementById("mA").value="";
  document.getElementById("tModal").classList.add("on");
  setTimeout(function(){document.getElementById("mT").focus()},100);
}
function openEdit(id){
  var t=tasks.find(function(x){return x.id===id}); if(!t) return;
  document.getElementById("mTitle").textContent="Edit Task";
  document.getElementById("mBtn").textContent="Save";
  document.getElementById("mMode").value="edit";
  document.getElementById("mId").value=id;
  document.getElementById("mT").value=t.title;
  document.getElementById("mD").value=t.description||"";
  document.getElementById("mP").value=t.priority||"medium";
  document.getElementById("mA").value=t.assignee||"";
  document.getElementById("tModal").classList.add("on");
  setTimeout(function(){document.getElementById("mT").focus()},100);
}
function closeM(){ document.getElementById("tModal").classList.remove("on"); }

function submit(){
  var title=document.getElementById("mT").value.trim();
  if(!title){ toast("Enter a title","w"); document.getElementById("mT").focus(); return; }
  var desc=document.getElementById("mD").value.trim();
  var pri=document.getElementById("mP").value;
  var who=document.getElementById("mA").value.trim();
  var mode=document.getElementById("mMode").value;
  var id=document.getElementById("mId").value;
  var st=document.getElementById("mSt").value;
  closeM(); sync("spin","Saving…");
  if(mode==="add"){
    google.script.run
      .withSuccessHandler(function(r){
        if(r.success){ tasks.push(r.task); render(); stats(); sync("ok","Live"); toast("Task added","s"); }
        else{ toast("Error: "+r.error,"e"); sync("err","Error"); }
      })
      .withFailureHandler(function(e){toast("Failed: "+e.message,"e")})
      .addTask(title,desc,pri,who,st);
  } else {
    google.script.run
      .withSuccessHandler(function(r){
        if(r.success){
          var t=tasks.find(function(x){return x.id===id});
          if(t){t.title=title;t.description=desc;t.priority=pri;t.assignee=who;t.lastUpdated=r.timestamp;}
          render(); stats(); sync("ok","Live"); toast("Task updated","s");
        } else { toast("Error: "+r.error,"e"); }
      })
      .withFailureHandler(function(e){toast("Failed: "+e.message,"e")})
      .editTask(id,title,desc,pri,who);
  }
}

// ── DELETE ────────────────────────────────────────────────────
function askDel(id){
  var t=tasks.find(function(x){return x.id===id}); if(!t) return;
  document.getElementById("dMsg").textContent='Delete "'+t.title+'"? Cannot be undone.';
  document.getElementById("dOk").onclick=function(){doDel(id);closeD();};
  document.getElementById("dModal").classList.add("on");
}
function closeD(){ document.getElementById("dModal").classList.remove("on"); }
function doDel(id){
  sync("spin","Deleting…");
  google.script.run
    .withSuccessHandler(function(r){
      if(r.success){ tasks=tasks.filter(function(t){return t.id!==id}); render(); stats(); sync("ok","Live"); toast("Deleted","i"); }
      else{ toast("Error: "+r.error,"e"); }
    })
    .withFailureHandler(function(e){toast("Failed: "+e.message,"e")})
    .deleteTask(id);
}

// ── SEARCH ────────────────────────────────────────────────────
var sd;
function onSearch(v){ clearTimeout(sd); sd=setTimeout(function(){q=v.trim().toLowerCase();render();},200); }

// ── STATS ─────────────────────────────────────────────────────
function stats(){
  document.getElementById("st").textContent=tasks.length;
  document.getElementById("sb").textContent=tasks.filter(function(t){return t.status==="Backlog"}).length;
  document.getElementById("si").textContent=tasks.filter(function(t){return t.status==="In-Progress"}).length;
  document.getElementById("sd").textContent=tasks.filter(function(t){return t.status==="Done"}).length;
}

// ── SYNC INDICATOR ────────────────────────────────────────────
function sync(s,t){
  var d=document.getElementById("dot"), tx=document.getElementById("stext");
  d.className="dot"+(s==="spin"?" spin":s==="err"?" err":"");
  tx.textContent=t;
}

// ── TOAST ─────────────────────────────────────────────────────
function toast(msg,type){
  var icons={s:"✅",e:"❌",w:"⚠️",i:"ℹ️"};
  var b=document.createElement("div");
  b.className="toast "+(type||"i");
  b.innerHTML='<span>'+(icons[type]||"ℹ️")+'</span><span>'+x(msg)+'</span>';
  document.getElementById("toasts").appendChild(b);
  setTimeout(function(){b.style.animation="toastOut .25s ease forwards";setTimeout(function(){b.remove()},260);},3500);
}

// ── UTILS ─────────────────────────────────────────────────────
function x(s){ return s?String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"):""; }

// Close modals on backdrop click + keyboard
["tModal","dModal"].forEach(function(id){
  document.getElementById(id).addEventListener("click",function(e){if(e.target===this)this.classList.remove("on");});
});
document.addEventListener("keydown",function(e){
  if(e.key==="Escape"){ closeM(); closeD(); }
  if((e.ctrlKey||e.metaKey)&&e.key==="n"){ e.preventDefault(); openAdd(); }
});
</script>
